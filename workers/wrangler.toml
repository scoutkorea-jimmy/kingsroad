name = "banginoja-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "b8cc5609b10c4df5b8e31aec570937b8"

[[d1_databases]]
binding = "DB"
database_name = "banginoja-db"
database_id = "f9974cb8-c5f9-4033-9cf2-b596098b677b"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "banginoja-media"

[vars]
# localhost / 127.0.0.1 의 임의 포트는 코드 측에서 자동 허용(isLocalDevOrigin).
ALLOWED_ORIGINS = "https://bgnj.net,https://www.bgnj.net,https://scoutkorea-jimmy.github.io"
SESSION_TTL_SECONDS = "2592000"
# 이 이메일로 회원가입하면 자동으로 is_admin=1로 등록된다 (한 번만 가능 — 두 번째 가입 시도는 409).
ADMIN_BOOTSTRAP_EMAIL = "admin@admin.admin"
# 슈퍼 관리자 — 콤마로 구분된 이메일은 로그인/세션 조회 시점에 항상 is_admin=1, grade_id='admin' 으로 강제된다.
SUPER_ADMIN_EMAILS = "scoutkorea@kakao.com"
