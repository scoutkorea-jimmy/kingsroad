<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="뱅기노자 — 비행기 타고 한국을 느끼다. 궁궐 답사부터 지역 여행까지, 한국의 역사·문화·자연을 함께 여행하는 커뮤니티.">
<meta name="theme-color" content="#FDFAF5">
<title>뱅기노자 — 비행기 타고 한국을 느끼다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#main">본문 바로가기</a>
<noscript><p style="padding:24px;color:#efe9dc;background:#0a0907;">
왕사들 사이트는 JavaScript로 렌더링됩니다. 스크립트를 활성화해주세요. 문의: hello@wangsadeul.kr
</p></noscript>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tiptap via ESM — exposes factories to window.WSD_TIPTAP -->
<script type="module">
  import { Editor } from 'https://esm.sh/@tiptap/core@2.11.5';
  import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.11.5';
  import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2.11.5';
  import Image from 'https://esm.sh/@tiptap/extension-image@2.11.5';
  import Link from 'https://esm.sh/@tiptap/extension-link@2.11.5';
  import Typography from 'https://esm.sh/@tiptap/extension-typography@2.11.5';
  import Dropcursor from 'https://esm.sh/@tiptap/extension-dropcursor@2.11.5';
  window.WSD_TIPTAP = { Editor, StarterKit, Placeholder, Image, Link, Typography, Dropcursor };
  window.dispatchEvent(new Event('wsd-tiptap-ready'));
</script>
<script src="data.js"></script>
<script src="components/KoreaMapData.js"></script>
<script type="text/babel" src="components/KoreaMap.jsx"></script>
<script type="text/babel" src="components/Shell.jsx"></script>
<script type="text/babel" src="components/TiptapEditor.jsx"></script>
<script type="text/babel" src="pages/HomePage.jsx"></script>
<script type="text/babel" src="pages/CommunityPage.jsx"></script>
<script type="text/babel" src="pages/WangsanamTourPage.jsx"></script>
<script type="text/babel" src="pages/ColumnPage.jsx"></script>
<script type="text/babel" src="pages/BookCheckoutPage.jsx"></script>
<script type="text/babel" src="pages/AuthAdminPage.jsx"></script>
<script type="text/babel" src="pages/LecturesPage.jsx"></script>
<script type="text/babel" src="pages/LegalFaqPages.jsx"></script>
<script type="text/babel" src="pages/MyPage.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lineStyle": "outline",
  "intensity": 1,
  "heroLayout": "center",
  "interactive": true
}/*EDITMODE-END*/;

const App = () => {
  const [route, setRoute] = React.useState(() => {
    try { return localStorage.getItem('wsd_route') || 'home'; } catch { return 'home'; }
  });
  const [postId, setPostId] = React.useState(null);
  const [user, setUser] = React.useState(() => window.WSD_AUTH.getSessionUser());
  const [cart, setCart] = React.useState(() => {
    try {
      const raw = localStorage.getItem('wsd_cart');
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  });
  React.useEffect(() => {
    try {
      if (cart) localStorage.setItem('wsd_cart', JSON.stringify(cart));
      else localStorage.removeItem('wsd_cart');
    } catch {}
  }, [cart]);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  const go = (r) => {
    setRoute(r);
    setPostId(null);
    try { localStorage.setItem('wsd_route', r); } catch {}
    window.scrollTo(0, 0);
  };

  const logout = () => {
    window.WSD_AUTH.signOut();
    setUser(null);
    setPostId(null);
    setRoute("home");
    try {
      localStorage.setItem('wsd_route', 'home');
    } catch {}
    window.scrollTo(0, 0);
  };

  // Edit-mode protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // URL 해시 딥 링크: #col-{id} → 칼럼 상세, #post-{id} → 커뮤니티 상세
  React.useEffect(() => {
    const applyHash = () => {
      const h = window.location.hash || '';
      const colMatch = h.match(/^#col-(.+)$/);
      const postMatch = h.match(/^#post-(.+)$/);
      const lectureMatch = h.match(/^#lecture-(.+)$/);
      if (colMatch) {
        try { sessionStorage.setItem('wsd_pending_column_id', decodeURIComponent(colMatch[1])); } catch {}
        setRoute('column');
        try { localStorage.setItem('wsd_route', 'column'); } catch {}
      } else if (postMatch) {
        try { sessionStorage.setItem('wsd_pending_post_id', decodeURIComponent(postMatch[1])); } catch {}
        setRoute('community');
        try { localStorage.setItem('wsd_route', 'community'); } catch {}
      } else if (lectureMatch) {
        try { sessionStorage.setItem('wsd_pending_lecture_id', decodeURIComponent(lectureMatch[1])); } catch {}
        setRoute('lectures');
        try { localStorage.setItem('wsd_route', 'lectures'); } catch {}
      } else {
        const tourMatch = h.match(/^#tour-(.+)$/);
        if (tourMatch) {
          try { sessionStorage.setItem('wsd_pending_tour_id', decodeURIComponent(tourMatch[1])); } catch {}
          setRoute('tour');
          try { localStorage.setItem('wsd_route', 'tour'); } catch {}
        }
      }
    };
    applyHash();
    window.addEventListener('hashchange', applyHash);
    return () => window.removeEventListener('hashchange', applyHash);
  }, []);

  const updateTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const hideNav = route === "login" || route === "signup" || route === "admin";
  const page = (() => {
    switch (route) {
      case "home": return <HomePage go={go} tweaks={tweaks}/>;
      case "community": return <CommunityPage go={go} postId={postId} setPostId={setPostId} user={user}/>;
      case "tour": return <TourPage go={go} user={user}/>;
      case "lectures": return <LecturesPage go={go} user={user}/>;
      case "privacy": return <LegalPage go={go} slug="privacy"/>;
      case "terms":   return <LegalPage go={go} slug="terms"/>;
      case "faq":     return <FaqPage go={go}/>;
      case "column": return <ColumnPage go={go} user={user}/>;
      case "book": return <BookPage go={go} cart={cart} setCart={setCart} user={user}/>;
      case "checkout": return <CheckoutPage go={go} cart={cart} user={user}/>;
      case "mypage": return <MyPage go={go} user={user} cart={cart}/>;
      case "login":
      case "signup": return <LoginPage go={go} setUser={setUser}/>;
      case "admin": return user?.isAdmin
        ? <AdminPage go={go} user={user}/>
        : <AdminDenied go={go} user={user}/>;
      default: return <HomePage go={go} tweaks={tweaks}/>;
    }
  })();

  return (
    <div className="app">
      <Nav route={route} go={go} user={user} onLogout={logout}/>
      <main id="main" tabIndex="-1" style={{flex:1, outline:'none'}} aria-label={`${route} 페이지 본문`}>{page}</main>
      {!hideNav && <Footer go={go}/>}
      <Tweaks tweaks={tweaks} setTweaks={updateTweaks} visible={editMode}/>
      <ScrollToTop/>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
